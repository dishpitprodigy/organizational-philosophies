# Pandoc defaults for a single Markdown document -> EPUB.
# Usage: pandoc -d publish/epub.yaml -M title="..." -o out.epub chapter.md

from: markdown+smart+gfm_auto_identifiers
toc: true
toc-depth: 2
number-sections: false

# Source docs open with a level-1 '# Title' heading that build-doc.sh
# strips and promotes to the EPUB title metadata; shift the remaining
# headings up one level so '## Section' becomes the top in-body heading.
shift-heading-level-by: -1

css:
  - publish/epub.css

epub-fonts:
  - "publish/fonts/*.otf"
